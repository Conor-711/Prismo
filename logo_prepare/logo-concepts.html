<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RedditAlpha · Logo 概念板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#FF4500; --green:#16C784;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:Montserrat,-apple-system,system-ui,sans-serif;
    --page: radial-gradient(120% 90% at 50% -10%, #16263f 0%, #0d1526 60%, #0a1120 100%);
    --stage: linear-gradient(150deg, #0d1526 0%, #20314c 100%);
    --ink:#eef2f7; --sub:#9fb1c6; --card:#101b2e; --line:#22324c;
    background:var(--page); color:var(--ink);
    min-height:100vh; padding:48px 28px 80px;
    transition:background .35s ease,color .35s ease;
  }
  body.light{
    --page: linear-gradient(160deg, #f4efe7 0%, #e9e1d4 100%);
    --stage: linear-gradient(150deg, #f6f1e8 0%, #e4dbcb 100%);
    --ink:#1b2430; --sub:#5f6e80; --card:#fffdf9; --line:#e6ddcf;
  }
  header{max-width:1180px; margin:0 auto 30px; display:flex; flex-wrap:wrap; align-items:flex-end; gap:16px 24px}
  h1{font-size:30px; font-weight:900; letter-spacing:-.02em; margin:0}
  h1 .a{color:var(--orange)} h1 .b{color:var(--green)}
  header p{margin:4px 0 0; color:var(--sub); font-size:14px; font-weight:600; max-width:560px; line-height:1.5}
  .toggle{margin-left:auto; display:flex; gap:10px; align-items:center}
  button{
    font-family:inherit; font-weight:800; font-size:13px; cursor:pointer;
    color:var(--ink); background:transparent; border:1.5px solid var(--line);
    padding:10px 16px; border-radius:999px; transition:all .2s;
  }
  button:hover{border-color:var(--orange); color:var(--orange)}
  .grid{max-width:1180px; margin:0 auto; display:grid; gap:20px;
    grid-template-columns:repeat(auto-fill,minmax(258px,1fr))}
  .group-label{max-width:1180px;margin:34px auto 6px;font-size:12px;font-weight:800;
    letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    overflow:hidden; display:flex; flex-direction:column; position:relative;
    transition:background .35s ease,border-color .35s ease,transform .15s ease;
  }
  .card:hover{transform:translateY(-3px)}
  .stage{aspect-ratio:1/1; background:var(--stage); display:grid; place-items:center;
    transition:background .35s ease}
  .stage svg{width:78%; height:78%; filter:drop-shadow(0 8px 16px rgba(0,0,0,.22))}
  body.light .stage svg{filter:drop-shadow(0 8px 16px rgba(60,40,20,.14))}
  .stage img{width:100%; height:100%; object-fit:cover; display:block}
  figcaption{padding:14px 16px 16px}
  figcaption h3{margin:0; font-size:15px; font-weight:800}
  figcaption p{margin:5px 0 0; font-size:12.5px; line-height:1.5; color:var(--sub); font-weight:600}
  .rec::after{content:"推荐"; position:absolute; top:12px; right:12px; z-index:2;
    background:var(--green); color:#04261a; font-size:11px; font-weight:900;
    padding:4px 9px; border-radius:999px; letter-spacing:.04em}
  .hook{display:inline-block; margin-top:8px; font-size:11px; font-weight:800;
    color:var(--orange); background:color-mix(in srgb,var(--orange) 14%, transparent);
    padding:3px 8px; border-radius:6px}
  footer{max-width:1180px; margin:36px auto 0; color:var(--sub); font-size:12.5px; line-height:1.7; font-weight:600}
</style>
</head>
<body>

<!-- shared gradient + arrowhead defs -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="og" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FF6A2A"/><stop offset="1" stop-color="#F23E00"/>
  </linearGradient>
  <linearGradient id="gg" x1="0" y1="1" x2="1" y2="0">
    <stop offset="0" stop-color="#12B273"/><stop offset="1" stop-color="#34E6A4"/>
  </linearGradient>
  <linearGradient id="rg" x1="0.08" y1="0.15" x2="0.95" y2="0.9">
    <stop offset="0" stop-color="#FF4500"/><stop offset=".55" stop-color="#FF6A00"/>
    <stop offset="1" stop-color="#16C784"/>
  </linearGradient>
  <marker id="ah" markerUnits="userSpaceOnUse" markerWidth="22" markerHeight="22"
    viewBox="0 0 10 10" refX="4.2" refY="5" orient="auto">
    <path d="M0 0 L9 5 L0 10 L3 5 Z" fill="#16C784"/>
  </marker>
</defs></svg>

<header>
  <div>
    <h1><span class="a">Reddit</span><span class="b">Alpha</span> · Logo 概念板</h1>
    <p>同一画布里横向对比所有方案。右上角可一键切换深色 / 浅色背景。前两张是你已认可的「连笔 R」实拍图，其余是新的吉祥物方向（矢量草图，定方向后再去 GPT 出精修大图）。</p>
  </div>
  <div class="toggle">
    <button id="bg">◐ 切换背景</button>
  </div>
</header>

<div class="group-label">现有基底 · 你已认可</div>
<div class="grid">
  <figure class="card">
    <div class="stage" style="background:#0c1320"><img src="image%20copy.png" alt="连笔 R 深色霓虹"></div>
    <figcaption><h3>连笔 R · 深色霓虹</h3>
      <p>橙→绿一笔甩成上涨箭头。优雅，但记忆点偏弱、缺一个“一眼记住”的角色。</p></figcaption>
  </figure>
  <figure class="card">
    <div class="stage" style="background:#f4efe7"><img src="image.png" alt="连笔 R 暖白"></div>
    <figcaption><h3>连笔 R · 暖白</h3>
      <p>同一字形的浅底版。干净、成熟，但同样偏“抽象符号”。</p></figcaption>
  </figure>
</div>

<div class="group-label">吉祥物新方向 · 提升记忆点</div>
<div class="grid">

  <!-- A · Alpha Bull -->
  <figure class="card rec">
    <div class="stage">
      <svg viewBox="0 0 240 240">
        <path d="M99 98 C 88 80 78 72 70 56" fill="none" stroke="url(#gg)" stroke-width="13" stroke-linecap="round" marker-end="url(#ah)"/>
        <path d="M141 98 C 152 80 162 72 170 56" fill="none" stroke="url(#gg)" stroke-width="13" stroke-linecap="round" marker-end="url(#ah)"/>
        <ellipse cx="72" cy="120" rx="18" ry="11" fill="#E03600" transform="rotate(-26 72 120)"/>
        <ellipse cx="168" cy="120" rx="18" ry="11" fill="#E03600" transform="rotate(26 168 120)"/>
        <path d="M120 86 C 97 86 81 101 81 126 C 81 153 99 189 120 195 C 141 189 159 153 159 126 C 159 101 143 86 120 86 Z" fill="url(#og)"/>
        <circle cx="110" cy="86" r="6" fill="url(#og)"/><circle cx="120" cy="82" r="6.5" fill="url(#og)"/><circle cx="130" cy="86" r="6" fill="url(#og)"/>
        <ellipse cx="120" cy="166" rx="31" ry="22" fill="#FFCDA3"/>
        <ellipse cx="110" cy="167" rx="4.5" ry="7" fill="#C44E28" transform="rotate(-12 110 167)"/>
        <ellipse cx="130" cy="167" rx="4.5" ry="7" fill="#C44E28" transform="rotate(12 130 167)"/>
        <ellipse cx="105" cy="127" rx="12" ry="15" fill="#fff"/>
        <ellipse cx="135" cy="127" rx="12" ry="15" fill="#fff"/>
        <circle cx="107" cy="131" r="5.5" fill="#0D1526"/>
        <circle cx="133" cy="131" r="5.5" fill="#0D1526"/>
        <circle cx="104.5" cy="128" r="2" fill="#fff"/><circle cx="130.5" cy="128" r="2" fill="#fff"/>
      </svg>
    </div>
    <figcaption><h3>A · Alpha 公牛</h3>
      <p>橙色小牛，<b>牛角=两支绿色上涨箭头</b>。牛市符号全球秒懂，又萌又专业，缩成小图标也清晰。</p>
      <span class="hook">钩子：牛 = 涨 + 角即箭头</span></figcaption>
  </figure>

  <!-- B · Alien surfing arrow -->
  <figure class="card rec">
    <div class="stage">
      <svg viewBox="0 0 240 240">
        <path d="M44 188 C 92 172 122 150 150 120 C 167 102 182 92 195 80" fill="none" stroke="url(#gg)" stroke-width="15" stroke-linecap="round" marker-end="url(#ah)"/>
        <ellipse cx="106" cy="151" rx="9" ry="5.5" fill="#E03600"/>
        <ellipse cx="131" cy="146" rx="9" ry="5.5" fill="#E03600"/>
        <ellipse cx="118" cy="120" rx="29" ry="33" fill="url(#og)"/>
        <path d="M141 119 L157 99" stroke="url(#og)" stroke-width="9" stroke-linecap="round"/>
        <path d="M95 122 L83 134" stroke="url(#og)" stroke-width="9" stroke-linecap="round"/>
        <path d="M118 88 L118 70" stroke="#E03600" stroke-width="5" stroke-linecap="round"/>
        <circle cx="118" cy="64" r="7" fill="url(#gg)"/>
        <ellipse cx="108" cy="114" rx="9" ry="11" fill="#fff"/>
        <ellipse cx="128" cy="114" rx="9" ry="11" fill="#fff"/>
        <circle cx="110" cy="117" r="4.2" fill="#0D1526"/>
        <circle cx="130" cy="117" r="4.2" fill="#0D1526"/>
        <path d="M108 132 Q118 140 129 131" fill="none" stroke="#0D1526" stroke-width="3.2" stroke-linecap="round"/>
      </svg>
    </div>
    <figcaption><h3>B · 小家伙冲浪上涨箭头</h3>
      <p>原创圆润角色（非 Snoo）骑着绿色箭头往上冲，天线顶着信号点。最有 Reddit 社区 / 散户文化味。</p>
      <span class="hook">钩子：to the moon 的上冲感</span></figcaption>
  </figure>

  <!-- C · Alpha α head -->
  <figure class="card">
    <div class="stage">
      <svg viewBox="0 0 240 240">
        <path d="M120 78 L120 58" fill="none" stroke="url(#gg)" stroke-width="7" stroke-linecap="round" marker-end="url(#ah)"/>
        <rect x="78" y="76" width="84" height="122" rx="42" fill="url(#og)"/>
        <ellipse cx="104" cy="112" rx="9" ry="11" fill="#fff"/>
        <ellipse cx="136" cy="112" rx="9" ry="11" fill="#fff"/>
        <circle cx="106" cy="115" r="4.2" fill="#0D1526"/>
        <circle cx="134" cy="115" r="4.2" fill="#0D1526"/>
        <path d="M106 132 Q120 142 134 132" fill="none" stroke="#0D1526" stroke-width="3.2" stroke-linecap="round"/>
        <text x="120" y="184" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="44" fill="#fff">α</text>
      </svg>
    </div>
    <figcaption><h3>C · Alpha 小子</h3>
      <p>把品牌名 <b>Alpha</b> 视觉化：肚子上印希腊字母 α，头顶绿色上涨天线。直接绑定“超额收益”含义。</p>
      <span class="hook">钩子：α = 跑赢大盘</span></figcaption>
  </figure>

  <!-- D · R-character -->
  <figure class="card">
    <div class="stage">
      <svg viewBox="0 0 240 240">
        <path d="M97 84 C 88 70 80 64 74 52" fill="none" stroke="url(#gg)" stroke-width="11" stroke-linecap="round" marker-end="url(#ah)"/>
        <path d="M143 84 C 152 70 160 64 166 52" fill="none" stroke="url(#gg)" stroke-width="11" stroke-linecap="round" marker-end="url(#ah)"/>
        <text x="120" y="182" text-anchor="middle" font-family="Montserrat,sans-serif" font-weight="900" font-size="172" fill="url(#rg)">R</text>
        <circle cx="103" cy="106" r="11" fill="#fff"/>
        <circle cx="131" cy="106" r="11" fill="#fff"/>
        <circle cx="105" cy="109" r="5" fill="#0D1526"/>
        <circle cx="129" cy="109" r="5" fill="#0D1526"/>
      </svg>
    </div>
    <figcaption><h3>D · 会笑的 R（桥接版）</h3>
      <p>保留你已认可的 R，加两只眼睛 + 绿色箭头“角”，把字母变成一个小角色。熟悉感 + 新记忆点二合一。</p>
      <span class="hook">钩子：字母拟人化</span></figcaption>
  </figure>

  <!-- E · Bull app tile -->
  <figure class="card">
    <div class="stage">
      <svg viewBox="0 0 240 240">
        <rect x="42" y="42" width="156" height="156" rx="38" fill="url(#og)"/>
        <path d="M104 96 C 96 82 88 76 82 64" fill="none" stroke="url(#gg)" stroke-width="11" stroke-linecap="round" marker-end="url(#ah)"/>
        <path d="M136 96 C 144 82 152 76 158 64" fill="none" stroke="url(#gg)" stroke-width="11" stroke-linecap="round" marker-end="url(#ah)"/>
        <ellipse cx="84" cy="120" rx="14" ry="9" fill="#fff" transform="rotate(-24 84 120)"/>
        <ellipse cx="156" cy="120" rx="14" ry="9" fill="#fff" transform="rotate(24 156 120)"/>
        <path d="M120 92 C 101 92 88 105 88 127 C 88 150 103 178 120 183 C 137 178 152 150 152 127 C 152 105 139 92 120 92 Z" fill="#fff"/>
        <ellipse cx="120" cy="158" rx="22" ry="15" fill="#FFD9BE"/>
        <ellipse cx="112" cy="159" rx="3.4" ry="5.5" fill="#FF6A2A"/>
        <ellipse cx="128" cy="159" rx="3.4" ry="5.5" fill="#FF6A2A"/>
        <circle cx="107" cy="128" r="6.5" fill="#0D1526"/>
        <circle cx="133" cy="128" r="6.5" fill="#0D1526"/>
      </svg>
    </div>
    <figcaption><h3>E · 公牛 App 图标</h3>
      <p>A 的图标化：橙色圆角方块 + 白色牛头 + 绿箭头角。最适合做 favicon / X 头像 / App 图标。</p>
      <span class="hook">钩子：落地小尺寸</span></figcaption>
  </figure>

  <!-- F · Bull + cursive R combo -->
  <figure class="card">
    <div class="stage">
      <svg viewBox="0 0 240 240">
        <!-- rising arrow tail -->
        <path d="M120 150 C 150 150 172 140 188 116" fill="none" stroke="url(#gg)" stroke-width="13" stroke-linecap="round" marker-end="url(#ah)"/>
        <!-- horns -->
        <path d="M88 92 C 78 76 68 70 60 56" fill="none" stroke="url(#gg)" stroke-width="11" stroke-linecap="round" marker-end="url(#ah)"/>
        <path d="M132 92 C 142 76 152 70 160 56" fill="none" stroke="url(#gg)" stroke-width="11" stroke-linecap="round" marker-end="url(#ah)"/>
        <!-- bull head -->
        <path d="M110 84 C 88 84 73 99 73 122 C 73 146 90 174 110 179 C 130 174 147 146 147 122 C 147 99 132 84 110 84 Z" fill="url(#og)"/>
        <ellipse cx="110" cy="150" rx="26" ry="18" fill="#FFCDA3"/>
        <ellipse cx="101" cy="151" rx="4" ry="6" fill="#C44E28"/>
        <ellipse cx="119" cy="151" rx="4" ry="6" fill="#C44E28"/>
        <ellipse cx="96" cy="120" rx="10.5" ry="13" fill="#fff"/>
        <ellipse cx="124" cy="120" rx="10.5" ry="13" fill="#fff"/>
        <circle cx="97" cy="123" r="5" fill="#0D1526"/>
        <circle cx="123" cy="123" r="5" fill="#0D1526"/>
      </svg>
    </div>
    <figcaption><h3>F · 公牛 + 上涨箭头</h3>
      <p>A 的另一种构图：牛头偏左，身后甩出一条绿色上涨曲线。更有“图标+动势”的故事感。</p>
      <span class="hook">钩子：牛 + 行情线</span></figcaption>
  </figure>

</div>

<footer>
  说明：以上吉祥物为<strong>矢量草图</strong>，用来快速比形状 / 配色 / 记忆点，细节（毛发、光泽、神态）还能再打磨。<br>
  下一步建议：你先圈出 1–2 个最有感觉的方向（比如 A / B），我再据此写精修 prompt 去 GPT 出高清大图，并配一套简化的 favicon 版。
</footer>

<script>
  document.getElementById('bg').onclick = function(){
    document.body.classList.toggle('light');
  };
</script>
</body>
</html>
